name: Build Tensor-VoLTE-VoWifi Canary Module

permissions:
  contents: write
on:
  push:
    branches:
      - canary
    workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install zip
        run: sudo apt-get install -y zip

      - name: Build module
        run: |
          chmod +x sh.sh
          bash sh.sh

      - name: Get commit info
        id: commit
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "msg=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tensor-VoLTE-VoWifi-Canary-${{ steps.commit.outputs.sha }}
          path: Tensor-VoLTE-VoWifi-Canary-*.zip

          
      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: canary-${{ steps.commit.outputs.sha }}
          name: ${{ steps.commit.outputs.sha }}
          prerelease: true
          files: Tensor-VoLTE-VoWifi-Canary-*.zip
          body: |
            ⚠️ **THIS IS CANARY VERSION, USE IT CAREFULL!**

            ---
            ### Commit
            ${{ steps.commit.outputs.msg }}